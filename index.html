<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>P2P Messenger - QR Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
        }

        /* Основной контейнер */
        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Хедер */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        /* Сетка для десктопа */
        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Левая панель */
        .sidebar {
            flex: 1;
            min-width: 320px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: fit-content;
        }

        /* Правая панель - чат */
        .chat-panel {
            flex: 2;
            min-width: 320px;
            background: white;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: calc(100vh - 140px);
        }

        /* Профиль пользователя */
        .profile-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .user-id {
            font-family: monospace;
            background: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            word-break: break-all;
            margin: 12px 0;
            border: 1px solid #e0e0e0;
        }

        /* Кнопки */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-outline {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }

        /* QR код */
        .qr-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            display: inline-block;
            margin: 10px 0;
        }

        #qrcode {
            display: flex;
            justify-content: center;
        }

        canvas {
            width: 200px;
            height: 200px;
        }

        /* Список чатов */
        .chats-list {
            margin-top: 20px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chat-item:hover {
            transform: translateX(5px);
        }

        .chat-name {
            font-weight: 600;
            font-size: 14px;
        }

        .chat-time {
            font-size: 10px;
            opacity: 0.7;
        }

        /* Чат область */
        .chat-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .connection-status {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-info {
            font-size: 10px;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Адаптив для телефонов */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }
            
            .grid {
                flex-direction: column;
            }
            
            .sidebar {
                min-width: auto;
                order: 2;
            }
            
            .chat-panel {
                min-width: auto;
                height: 60vh;
                order: 1;
            }
            
            .header h1 {
                font-size: 1.4rem;
            }
            
            .message {
                max-width: 90%;
            }
            
            .btn {
                padding: 10px 16px;
            }
        }

        /* Скроллбар */
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .text-code {
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
        }

        .flex-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .flex-buttons .btn {
            flex: 1;
            margin-top: 0;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🔗 P2P Messenger</h1>
            <p>Прямое соединение • QR код • Сохранение чатов</p>
        </div>
        
        <div class="grid">
            <!-- Левая панель -->
            <div class="sidebar">
                <div class="profile-card">
                    <div class="avatar" id="avatar">👤</div>
                    <h3>Ваш ID</h3>
                    <div class="user-id" id="userId"></div>
                    <div class="flex-buttons">
                        <button class="btn btn-outline" onclick="copyUserId()">📋 Копировать</button>
                        <button class="btn btn-outline" onclick="refreshQR()">🔄 Обновить QR</button>
                    </div>
                </div>

                <div class="qr-section">
                    <h3>📱 Подключиться через QR</h3>
                    <div class="qr-container" id="qrcode"></div>
                    <div class="text-code" id="textCode"></div>
                    <div class="flex-buttons">
                        <button class="btn btn-outline" onclick="copyTextCode()">📋 Копировать код</button>
                        <button class="btn btn-outline" onclick="shareCode()">📤 Поделиться</button>
                    </div>
                </div>

                <div class="qr-section">
                    <h3>🔌 Подключиться к другу</h3>
                    <textarea id="connectCode" rows="3" placeholder="Вставьте код приглашения от друга" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e0e0e0; margin:10px 0;"></textarea>
                    <button class="btn btn-primary" onclick="connectToPeer()">🔗 Подключиться</button>
                </div>

                <div class="chats-list">
                    <h3>💬 История чатов</h3>
                    <div id="chatsList"></div>
                </div>
            </div>
            
            <!-- Правая панель - чат -->
            <div class="chat-panel">
                <div class="chat-header">
                    <h3 id="chatTitle">Выберите чат</h3>
                    <div class="connection-status" id="connectionStatus">⚡ Не подключен</div>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <textarea id="messageInput" placeholder="Введите сообщение..." rows="2"></textarea>
                    <button id="sendBtn" onclick="sendMessage()" disabled>📨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация STUN серверов
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ]
        };

        // Глобальные переменные
        let peerConnection = null;
        let dataChannel = null;
        let currentPeerId = null;
        let myId = generateUserId();
        let currentAnswer = null;
        let pendingOffers = new Map();
        
        // Хранилище чатов (localStorage)
        let chats = loadChats();
        let currentChat = null;

        // Генерация уникального ID
        function generateUserId() {
            let saved = localStorage.getItem('myUserId');
            if (saved) return saved;
            const random = Math.random().toString(36).substr(2, 10);
            const timestamp = Date.now().toString(36);
            const newId = `${random}${timestamp}`.toUpperCase();
            localStorage.setItem('myUserId', newId);
            return newId;
        }

        // Загрузка чатов из localStorage
        function loadChats() {
            const saved = localStorage.getItem('p2pChats');
            if (saved) {
                const chats = JSON.parse(saved);
                // Конвертируем даты обратно
                for (let id in chats) {
                    if (chats[id].messages) {
                        chats[id].messages = chats[id].messages.map(m => ({
                            ...m,
                            timestamp: new Date(m.timestamp)
                        }));
                    }
                }
                return chats;
            }
            return {};
        }

        // Сохранение чатов
        function saveChats() {
            const toSave = {};
            for (let id in chats) {
                toSave[id] = {
                    ...chats[id],
                    messages: chats[id].messages.map(m => ({
                        ...m,
                        timestamp: m.timestamp.toISOString()
                    }))
                };
            }
            localStorage.setItem('p2pChats', JSON.stringify(toSave));
        }

        // Сохранение сообщения
        function saveMessage(peerId, message, isSent) {
            if (!chats[peerId]) {
                chats[peerId] = {
                    name: peerId,
                    lastSeen: new Date(),
                    messages: []
                };
            }
            chats[peerId].messages.push({
                text: message,
                isSent: isSent,
                timestamp: new Date()
            });
            chats[peerId].lastSeen = new Date();
            saveChats();
            updateChatsList();
            
            if (currentChat === peerId) {
                displayMessages(peerId);
            }
        }

        // Обновление списка чатов
        function updateChatsList() {
            const container = document.getElementById('chatsList');
            const sorted = Object.entries(chats).sort((a, b) => b[1].lastSeen - a[1].lastSeen);
            
            container.innerHTML = sorted.map(([id, chat]) => `
                <div class="chat-item ${currentChat === id ? 'active' : ''}" onclick="selectChat('${id}')">
                    <div>
                        <div class="chat-name">${id.substr(0, 12)}...</div>
                        <div class="chat-time">${formatTime(chat.lastSeen)}</div>
                    </div>
                    <div>💬 ${chat.messages.length}</div>
                </div>
            `).join('');
            
            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">Нет чатов</div>';
            }
        }

        // Выбор чата
        function selectChat(peerId) {
            currentChat = peerId;
            currentPeerId = peerId;
            document.getElementById('chatTitle').textContent = `Чат с: ${peerId.substr(0, 12)}...`;
            displayMessages(peerId);
            updateChatsList();
            
            // Пытаемся восстановить соединение если есть
            if (chats[peerId] && chats[peerId].connectionData) {
                restoreConnection(peerId);
            }
        }

        // Отображение сообщений
        function displayMessages(peerId) {
            const container = document.getElementById('messages');
            const messages = chats[peerId]?.messages || [];
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.isSent ? 'sent' : 'received'}">
                    <div class="message-info">${msg.isSent ? 'Вы' : peerId.substr(0, 8)} • ${formatTime(msg.timestamp)}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        // Форматирование времени
        function formatTime(date) {
            const d = new Date(date);
            const now = new Date();
            if (d.toDateString() === now.toDateString()) {
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return d.toLocaleDateString();
        }

        // Генерация QR кода и текстового кода
        function generateConnectionCode() {
            const connectionData = {
                type: 'connection_request',
                from: myId,
                timestamp: Date.now(),
                offer: null
            };
            
            const code = JSON.stringify(connectionData);
            const textCodeElem = document.getElementById('textCode');
            textCodeElem.textContent = code;
            
            // Генерация QR
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';
            new QRCode(qrcodeDiv, {
                text: code,
                width: 200,
                height: 200,
                colorDark: '#667eea',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            
            return code;
        }

        // Обновить QR
        function refreshQR() {
            generateConnectionCode();
        }

        // Копировать текстовый код
        function copyTextCode() {
            const code = document.getElementById('textCode').textContent;
            navigator.clipboard.writeText(code);
            alert('✅ Код скопирован!');
        }

        // Поделиться кодом
        function shareCode() {
            const code = document.getElementById('textCode').textContent;
            if (navigator.share) {
                navigator.share({
                    title: 'P2P Messenger приглашение',
                    text: code
                });
            } else {
                copyTextCode();
            }
        }

        // Подключиться к собеседнику по коду
        async function connectToPeer() {
            const code = document.getElementById('connectCode').value.trim();
            if (!code) {
                alert('Введите код приглашения');
                return;
            }
            
            try {
                const data = JSON.parse(code);
                if (data.type === 'connection_request') {
                    // Создаем offer для подключения
                    await createOfferForPeer(data.from);
                }
            } catch (e) {
                alert('Неверный формат кода');
            }
        }

        // Создать offer для подключения
        async function createOfferForPeer(targetId) {
            currentPeerId = targetId;
            updateConnectionStatus('connecting', '🔄 Установка соединения...');
            
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            dataChannel = peerConnection.createDataChannel('chat');
            setupDataChannel(dataChannel);
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await waitForIceGathering();
                
                const offerData = {
                    type: 'offer',
                    sdp: peerConnection.localDescription.sdp,
                    from: myId,
                    to: currentPeerId
                };
                
                const offerText = JSON.stringify(offerData);
                
                // Сохраняем offer
                if (!chats[currentPeerId]) {
                    chats[currentPeerId] = { name: currentPeerId, messages: [], lastSeen: new Date() };
                }
                chats[currentPeerId].connectionData = offerData;
                saveChats();
                
                showModal('📨 Отправьте это приглашение', offerText);
                updateConnectionStatus('waiting', '⏳ Ожидание ответа...');
                
            } catch (error) {
                console.error(error);
                updateConnectionStatus('error', '❌ Ошибка');
            }
        }

        // Принять приглашение
        async function acceptOffer(offerText) {
            try {
                const offerData = JSON.parse(offerText);
                if (offerData.type !== 'offer') throw new Error('Неверный формат');
                
                currentPeerId = offerData.from;
                updateConnectionStatus('connecting', '🔄 Принятие приглашения...');
                
                if (peerConnection) peerConnection.close();
                
                peerConnection = new RTCPeerConnection(configuration);
                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel(dataChannel);
                };
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offerData));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await waitForIceGathering();
                
                const answerData = {
                    type: 'answer',
                    sdp: peerConnection.localDescription.sdp,
                    from: myId,
                    to: currentPeerId
                };
                
                currentAnswer = JSON.stringify(answerData);
                showModal('📤 Отправьте этот ответ', currentAnswer);
                updateConnectionStatus('waiting', '⏳ Ожидание подтверждения...');
                
            } catch (error) {
                console.error(error);
                alert('Ошибка при принятии приглашения');
                updateConnectionStatus('error', '❌ Ошибка');
            }
        }

        // Обработка ответа
        async function handleAnswer(answerText) {
            try {
                const answerData = JSON.parse(answerText);
                if (answerData.type === 'answer' && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answerData));
                    updateConnectionStatus('connected', '✅ Подключено!');
                    document.getElementById('sendBtn').disabled = false;
                    addSystemMessage('🔗 Соединение установлено!');
                    
                    // Сохраняем успешное соединение
                    if (chats[currentPeerId]) {
                        chats[currentPeerId].connected = true;
                        saveChats();
                    }
                }
            } catch (error) {
                console.error(error);
                alert('Ошибка при обработке ответа');
            }
        }

        // Ожидание ICE кандидатов
        function waitForIceGathering() {
            return new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') {
                    resolve();
                } else {
                    peerConnection.onicegatheringstatechange = () => {
                        if (peerConnection.iceGatheringState === 'complete') resolve();
                    };
                }
            });
        }

        // Настройка DataChannel
        function setupDataChannel(channel) {
            channel.onopen = () => {
                updateConnectionStatus('connected', '✅ Подключено!');
                document.getElementById('sendBtn').disabled = false;
                addSystemMessage('🔗 Соединение установлено!');
            };
            
            channel.onclose = () => {
                updateConnectionStatus('disconnected', '❌ Разорвано');
                document.getElementById('sendBtn').disabled = true;
            };
            
            channel.onmessage = (event) => {
                receiveMessage(event.data);
            };
        }

        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            if (!dataChannel || dataChannel.readyState !== 'open') {
                alert('Соединение не установлено');
                return;
            }
            
            dataChannel.send(message);
            saveMessage(currentPeerId, message, true);
            input.value = '';
        }

        // Получение сообщения
        function receiveMessage(message) {
            if (currentPeerId) {
                saveMessage(currentPeerId, message, false);
                if (currentChat === currentPeerId) {
                    displayMessages(currentPeerId);
                }
            }
        }

        // Добавление системного сообщения
        function addSystemMessage(message) {
            const container = document.getElementById('messages');
            const msgElement = document.createElement('div');
            msgElement.style.cssText = 'text-align: center; color: #666; font-size: 11px; padding: 5px;';
            msgElement.textContent = message;
            container.appendChild(msgElement);
            container.scrollTop = container.scrollHeight;
        }

        // Обновление статуса подключения
        function updateConnectionStatus(status, text) {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.textContent = text;
            statusDiv.style.color = status === 'connected' ? '#10b981' : status === 'error' ? '#ef4444' : '#f59e0b';
        }

        // Показать модальное окно
        function showModal(title, text) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>${title}</h3>
                    <textarea readonly style="width:100%; height:150px; margin:15px 0; padding:10px; font-family:monospace; font-size:11px; border:1px solid #ddd; border-radius:8px;">${text}</textarea>
                    <div class="flex-buttons">
                        <button class="btn btn-primary" onclick="copyToClipboard('${text.replace(/'/g, "\\'")}'); this.closest('.modal').remove();">📋 Копировать</button>
                        <button class="btn btn-outline" onclick="this.closest('.modal').remove();">Закрыть</button>
                    </div>
                    <button class="btn btn-success" style="margin-top:10px;" onclick="if(window.pasteAnswer) window.pasteAnswerFromModal('${text.replace(/'/g, "\\'")}'); this.closest('.modal').remove();">📨 Я получил ответ</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // Копирование в буфер
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text);
            alert('✅ Скопировано!');
        };

        // Вставка ответа из модалки
        window.pasteAnswerFromModal = function(answerText) {
            const answer = prompt('Вставьте ответ от собеседника:');
            if (answer) handleAnswer(answer);
        };

        // Вставка ответа глобально
        window.pasteAnswer = function() {
            const answer = prompt('Вставьте ответ от собесебника:');
            if (answer) handleAnswer(answer);
        };

        // Восстановление соединения
        async function restoreConnection(peerId) {
            const chat = chats[peerId];
            if (chat && chat.connectionData) {
                await createOfferForPeer(peerId);
            }
        }

        // Экранирование HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Копировать свой ID
        function copyUserId() {
            navigator.clipboard.writeText(myId);
            alert('✅ ID скопирован!');
        }

        // Инициализация
        document.getElementById('userId').textContent = myId;
        document.getElementById('avatar').textContent = myId.charAt(0);
        generateConnectionCode();
        updateChatsList();
        
        // Enter для отправки
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        
        // Обработка входящих приглашений через prompt
        window.acceptOfferPrompt = function() {
            const offer = prompt('Вставьте приглашение от друга:');
            if (offer) acceptOffer(offer);
        };
        
        // Добавляем кнопку для принятия приглашения в интерфейс
        const acceptBtn = document.createElement('button');
        acceptBtn.textContent = '📨 Принять приглашение';
        acceptBtn.className = 'btn btn-success';
        acceptBtn.style.marginTop = '10px';
        acceptBtn.onclick = () => {
            const offer = prompt('Вставьте приглашение от друга:');
            if (offer) acceptOffer(offer);
        };
        document.querySelector('.qr-section:last-child').appendChild(acceptBtn);
        
        console.log('✅ P2P Messenger готов!');
        console.log('Ваш ID:', myId);
    </script>
</body>
