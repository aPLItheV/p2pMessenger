<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>P2P Messenger - QR Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
            width: calc(100% - 40px);
            pointer-events: none;
        }

        .notification {
            background: white;
            border-radius: 16px;
            padding: 14px 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            pointer-events: auto;
            border-left: 4px solid;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification.success { border-left-color: #10b981; }
        .notification.error { border-left-color: #ef4444; }
        .notification.info { border-left-color: #3b82f6; }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .header h1 { font-size: 1.6rem; margin-bottom: 6px; }
        .header p { opacity: 0.9; font-size: 0.85rem; }

        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sidebar {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .chat-panel {
            flex: 2;
            min-width: 300px;
            background: white;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: calc(100vh - 140px);
        }

        .profile-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 24px;
            color: white;
        }

        .user-id {
            font-family: monospace;
            background: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 11px;
            word-break: break-all;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-outline { background: white; border: 2px solid #667eea; color: #667eea; }

        .qr-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 16px;
            display: inline-block;
            margin: 10px auto;
        }

        #qrcode canvas, #qrcode img {
            width: 180px !important;
            height: 180px !important;
        }

        .scan-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .scan-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            font-size: 12px;
            font-family: monospace;
            margin: 10px 0;
        }

        .requests-panel {
            margin-top: 20px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .requests-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .request-card {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        .request-user {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .request-time {
            font-size: 10px;
            color: #666;
            margin-bottom: 12px;
        }

        .request-buttons {
            display: flex;
            gap: 10px;
        }

        .request-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .accept-request { background: #10b981; color: white; }
        .reject-request { background: #ef4444; color: white; }

        .no-requests {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 13px;
        }

        .chats-list {
            margin-top: 20px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .connection-status { font-size: 12px; opacity: 0.9; margin-top: 4px; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        #sendBtn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .grid { flex-direction: column; }
            .sidebar { min-width: auto; order: 2; }
            .chat-panel { min-width: auto; height: 55vh; order: 1; }
            .message { max-width: 90%; }
            .notification-container { top: 10px; right: 10px; max-width: calc(100% - 20px); }
            #qrcode canvas, #qrcode img {
                width: 150px !important;
                height: 150px !important;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app">
        <div class="notification-container" id="notificationContainer"></div>
        
        <div class="header">
            <h1>🔗 P2P Messenger</h1>
            <p>Отсканируй QR — прими запрос — общайся</p>
        </div>
        
        <div class="grid">
            <div class="sidebar">
                <div class="profile-card">
                    <div class="avatar" id="avatar">👤</div>
                    <h3>Ваш ID</h3>
                    <div class="user-id" id="userId"></div>
                    <button class="btn btn-outline" onclick="copyUserId()">📋 Копировать ID</button>
                </div>

                <div class="qr-section">
                    <h3>📱 Ваш QR код</h3>
                    <p style="font-size: 12px; color: #666;">Друг сканирует и отправляет запрос</p>
                    <div class="qr-container" id="qrcode"></div>
                </div>

                <div class="scan-section">
                    <h3>🔍 Отсканировать QR друга</h3>
                    <textarea id="scanQRInput" class="scan-input" rows="2" placeholder="Вставьте сюда текст из QR кода друга"></textarea>
                    <button class="btn btn-primary" onclick="scanQR()">📷 Отправить запрос</button>
                </div>

                <div class="requests-panel">
                    <div class="requests-title">
                        <span>📞 Входящие запросы</span>
                        <span id="requestsCount" style="background: #ef4444; color: white; padding: 2px 8px; border-radius: 20px; font-size: 11px;">0</span>
                    </div>
                    <div id="requestsList"></div>
                </div>

                <div class="chats-list">
                    <h3>💬 История чатов</h3>
                    <div id="chatsList"></div>
                </div>
            </div>
            
            <div class="chat-panel">
                <div class="chat-header">
                    <h3 id="chatTitle">Выберите чат</h3>
                    <div class="connection-status" id="connectionStatus">⚡ Не подключен</div>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <textarea id="messageInput" placeholder="Введите сообщение..." rows="2"></textarea>
                    <button id="sendBtn" onclick="sendMessage()" disabled>📨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация WebRTC
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        // Переменные
        let peerConnection = null;
        let dataChannel = null;
        let currentPeerId = null;
        let myId = generateUserId();
        let pendingRequests = [];
        let activeConnections = new Map();
        let nextRequestId = 1;
        
        let chats = loadChats();
        let currentChat = null;

        // Уведомления
        function showNotification(title, message, type = 'info', duration = 3500) {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            notification.innerHTML = `
                <div class="notification-icon">${icons[type] || 'ℹ️'}</div>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close" onclick="this.parentElement.remove()">✕</div>
            `;
            container.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }

        // Хранение
        function generateUserId() {
            let saved = localStorage.getItem('myUserId');
            if (saved) return saved;
            const random = Math.random().toString(36).substr(2, 8).toUpperCase();
            const timestamp = Date.now().toString(36).substr(-6).toUpperCase();
            const newId = `${random}${timestamp}`;
            localStorage.setItem('myUserId', newId);
            return newId;
        }

        function loadChats() {
            const saved = localStorage.getItem('p2pChats');
            if (saved) {
                const chats = JSON.parse(saved);
                for (let id in chats) {
                    if (chats[id].messages) {
                        chats[id].messages = chats[id].messages.map(m => ({
                            ...m,
                            timestamp: new Date(m.timestamp)
                        }));
                    }
                }
                return chats;
            }
            return {};
        }

        function saveChats() {
            const toSave = {};
            for (let id in chats) {
                toSave[id] = {
                    ...chats[id],
                    messages: chats[id].messages.map(m => ({
                        ...m,
                        timestamp: m.timestamp.toISOString()
                    }))
                };
            }
            localStorage.setItem('p2pChats', JSON.stringify(toSave));
        }

        function saveMessage(peerId, message, isSent) {
            if (!chats[peerId]) {
                chats[peerId] = { name: peerId, lastSeen: new Date(), messages: [] };
            }
            chats[peerId].messages.push({ text: message, isSent, timestamp: new Date() });
            chats[peerId].lastSeen = new Date();
            saveChats();
            updateChatsList();
            if (currentChat === peerId) displayMessages(peerId);
        }

        function updateChatsList() {
            const container = document.getElementById('chatsList');
            const sorted = Object.entries(chats).sort((a, b) => b[1].lastSeen - a[1].lastSeen);
            container.innerHTML = sorted.map(([id, chat]) => `
                <div class="chat-item ${currentChat === id ? 'active' : ''}" onclick="selectChat('${id}')">
                    <div><div class="chat-name">${id.substr(0, 12)}...</div></div>
                    <div>💬 ${chat.messages.length}</div>
                </div>
            `).join('');
            if (sorted.length === 0) container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">Нет чатов</div>';
        }

        function selectChat(peerId) {
            currentChat = peerId;
            currentPeerId = peerId;
            document.getElementById('chatTitle').textContent = `Чат с: ${peerId.substr(0, 12)}...`;
            displayMessages(peerId);
            updateChatsList();
            
            const conn = activeConnections.get(peerId);
            if (conn && conn.dc && conn.dc.readyState === 'open') {
                document.getElementById('sendBtn').disabled = false;
                updateConnectionStatus('connected', '✅ Подключено');
            } else {
                document.getElementById('sendBtn').disabled = true;
                updateConnectionStatus('disconnected', '❌ Не подключен');
            }
        }

        function displayMessages(peerId) {
            const container = document.getElementById('messages');
            const messages = chats[peerId]?.messages || [];
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.isSent ? 'sent' : 'received'}">
                    <div class="message-info">${msg.isSent ? 'Вы' : peerId.substr(0, 8)} • ${formatTime(msg.timestamp)}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(date) {
            const d = new Date(date);
            const now = new Date();
            if (d.toDateString() === now.toDateString()) {
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return d.toLocaleDateString();
        }

        // QR код
        function generateQR() {
            const qrData = JSON.stringify({ id: myId });
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';
            new QRCode(qrcodeDiv, {
                text: qrData,
                width: 180,
                height: 180,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        function copyUserId() {
            navigator.clipboard.writeText(myId);
            showNotification('Скопировано', 'ID скопирован', 'success', 1500);
        }

        // Сканирование QR и отправка запроса
        async function scanQR() {
            const qrText = document.getElementById('scanQRInput').value.trim();
            if (!qrText) {
                showNotification('Ошибка', 'Вставьте текст из QR кода друга', 'error', 2000);
                return;
            }
            
            try {
                const data = JSON.parse(qrText);
                const friendId = data.id;
                
                if (friendId === myId) {
                    showNotification('Ошибка', 'Это ваш собственный QR код', 'warning', 2000);
                    return;
                }
                
                showNotification('Запрос', `Отправляем запрос ${friendId.substr(0, 12)}...`, 'info', 1500);
                await sendOfferToFriend(friendId);
                
            } catch(e) {
                showNotification('Ошибка', 'Неверный QR код', 'error', 2000);
            }
        }

        // Отправить offer другу
        async function sendOfferToFriend(friendId) {
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            dataChannel = peerConnection.createDataChannel('chat');
            
            let offerCreated = false;
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate === null && !offerCreated && peerConnection.localDescription) {
                    offerCreated = true;
                    const offerData = {
                        from: myId,
                        to: friendId,
                        sdp: peerConnection.localDescription.sdp
                    };
                    // Отправляем запрос получателю (через локальное хранилище)
                    sendRequestToPeer(offerData);
                }
            };
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // Таймаут на случай если ICE не сработает
                setTimeout(() => {
                    if (!offerCreated && peerConnection.localDescription) {
                        offerCreated = true;
                        const offerData = {
                            from: myId,
                            to: friendId,
                            sdp: peerConnection.localDescription.sdp
                        };
                        sendRequestToPeer(offerData);
                    }
                }, 1000);
                
            } catch (error) {
                console.error(error);
                showNotification('Ошибка', 'Не удалось создать запрос', 'error', 2000);
            }
        }

        // Отправка запроса (демо - через prompt для передачи)
        function sendRequestToPeer(offerData) {
            const requestText = JSON.stringify(offerData);
            
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.85);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10001;
            `;
            modal.innerHTML = `
                <div style="background: white; border-radius: 28px; padding: 24px; max-width: 90%; width: 340px; text-align: center;">
                    <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px;">📨</div>
                    <h3>Отправьте запрос другу</h3>
                    <p style="margin: 12px 0; font-size: 13px;">Скопируйте этот код и отправьте другу:</p>
                    <textarea readonly style="width:100%; height:120px; margin:10px 0; padding:8px; font-family:monospace; font-size:10px; border:1px solid #ddd; border-radius:12px;">${requestText}</textarea>
                    <button class="btn btn-primary" onclick="copyAndClose('${requestText.replace(/'/g, "\\'")}', this)">📋 Копировать</button>
                    <button class="btn btn-outline" style="margin-top: 8px;" onclick="this.closest('div').parentElement.remove()">Закрыть</button>
                    <p style="margin-top: 12px; font-size: 11px; color: #999;">Друг должен вставить этот код в поле ниже</p>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function copyAndClose(text, btn) {
            navigator.clipboard.writeText(text);
            showNotification('Скопировано', 'Код скопирован, отправьте другу', 'success', 2000);
            const modal = btn.closest('div').parentElement.parentElement;
            if (modal) modal.remove();
        }

        // Получение запроса (вставка кода от друга)
        function receiveRequestFromFriend(requestText) {
            try {
                const data = JSON.parse(requestText);
                const fromId = data.from;
                
                if (fromId === myId) {
                    showNotification('Ошибка', 'Это ваш собственный запрос', 'warning', 2000);
                    return;
                }
                
                // Проверяем дубликаты
                const existing = pendingRequests.find(r => r.from === fromId);
                if (existing) {
                    showNotification('Повторный запрос', `${fromId.substr(0, 12)}... уже отправил запрос`, 'warning', 2000);
                    return;
                }
                
                const request = {
                    id: nextRequestId++,
                    from: fromId,
                    sdp: data.sdp,
                    timestamp: new Date()
                };
                pendingRequests.push(request);
                updateRequestsList();
                
                showNotification('🔔 Новый запрос!', `${fromId.substr(0, 12)}... хочет с вами связаться`, 'info', 5000);
                
            } catch(e) {
                showNotification('Ошибка', 'Неверный формат запроса', 'error', 2000);
            }
        }

        function updateRequestsList() {
            const container = document.getElementById('requestsList');
            const countSpan = document.getElementById('requestsCount');
            countSpan.textContent = pendingRequests.length;
            
            if (pendingRequests.length === 0) {
                container.innerHTML = '<div class="no-requests">Нет входящих запросов</div>';
                return;
            }
            
            container.innerHTML = pendingRequests.map(req => `
                <div class="request-card" id="request-${req.id}">
                    <div class="request-user">👤 ${req.from.substr(0, 20)}...</div>
                    <div class="request-time">${formatTime(req.timestamp)}</div>
                    <div class="request-buttons">
                        <button class="accept-request" onclick="acceptRequest(${req.id})">✅ Принять</button>
                        <button class="reject-request" onclick="rejectRequest(${req.id})">❌ Отклонить</button>
                    </div>
                </div>
            `).join('');
        }

        // Принять запрос
        window.acceptRequest = async function(requestId) {
            const request = pendingRequests.find(r => r.id === requestId);
            if (!request) return;
            
            pendingRequests = pendingRequests.filter(r => r.id !== requestId);
            updateRequestsList();
            
            currentPeerId = request.from;
            showNotification('Принято', `Подключаемся к ${currentPeerId.substr(0, 12)}...`, 'success', 2000);
            updateConnectionStatus('connecting', '🔄 Установка соединения...');
            
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel(dataChannel);
            };
            
            try {
                const offer = new RTCSessionDescription({ type: 'offer', sdp: request.sdp });
                await peerConnection.setRemoteDescription(offer);
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await waitForIceGathering();
                
                const answerData = {
                    type: 'answer',
                    sdp: peerConnection.localDescription.sdp,
                    from: myId,
                    to: currentPeerId
                };
                
                const answerText = JSON.stringify(answerData);
                showAnswerDialog(answerText);
                
            } catch (error) {
                console.error(error);
                showNotification('Ошибка', 'Не удалось создать соединение', 'error', 3000);
                updateConnectionStatus('error', '❌ Ошибка');
            }
        };

        window.rejectRequest = function(requestId) {
            const request = pendingRequests.find(r => r.id === requestId);
            if (request) {
                pendingRequests = pendingRequests.filter(r => r.id !== requestId);
                updateRequestsList();
                showNotification('Отклонено', `Вы отклонили запрос от ${request.from.substr(0, 12)}...`, 'info', 2000);
            }
        };

        function showAnswerDialog(answerText) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.85);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10001;
            `;
            modal.innerHTML = `
                <div style="background: white; border-radius: 28px; padding: 24px; max-width: 90%; width: 340px; text-align: center;">
                    <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px;">✅</div>
                    <h3>Соединение готово!</h3>
                    <p style="margin: 12px 0; font-size: 13px;">Скопируйте этот код и отправьте собеседнику:</p>
                    <textarea readonly style="width:100%; height:100px; margin:10px 0; padding:8px; font-family:monospace; font-size:10px; border:1px solid #ddd; border-radius:12px;">${answerText}</textarea>
                    <button class="btn btn-primary" onclick="copyAnswerAndClose('${answerText.replace(/'/g, "\\'")}', this)">📋 Копировать</button>
                    <button class="btn btn-outline" style="margin-top: 8px;" onclick="this.closest('div').parentElement.remove()">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function copyAnswerAndClose(text, btn) {
            navigator.clipboard.writeText(text);
            showNotification('Скопировано', 'Ответ скопирован, отправьте другу', 'success', 2000);
            const modal = btn.closest('div').parentElement.parentElement;
            if (modal) modal.remove();
        }

        // Обработка ответа
        async function handleAnswer(answerText) {
            try {
                const answerData = JSON.parse(answerText);
                if (answerData.type === 'answer' && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answerData));
                    updateConnectionStatus('connected', '✅ Подключено!');
                    document.getElementById('sendBtn').disabled = false;
                    showNotification('Успешно!', 'Соединение установлено!', 'success', 3000);
                    
                    activeConnections.set(currentPeerId, { pc: peerConnection, dc: dataChannel });
                    
                    if (!chats[currentPeerId]) {
                        chats[currentPeerId] = { name: currentPeerId, messages: [], lastSeen: new Date() };
                        saveChats();
                    }
                    updateChatsList();
                    selectChat(currentPeerId);
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка', 'Неверный формат ответа', 'error', 3000);
            }
        }

        function waitForIceGathering() {
            return new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') {
                    resolve();
                } else {
                    peerConnection.onicegatheringstatechange = () => {
                        if (peerConnection.iceGatheringState === 'complete') resolve();
                    };
                }
            });
        }

        function setupDataChannel(channel) {
            dataChannel = channel;
            channel.onopen = () => {
                updateConnectionStatus('connected', '✅ Подключено!');
                document.getElementById('sendBtn').disabled = false;
                showNotification('Соединение установлено', 'Можно общаться', 'success', 3000);
                activeConnections.set(currentPeerId, { pc: peerConnection, dc: dataChannel });
            };
            channel.onclose = () => {
                updateConnectionStatus('disconnected', '❌ Разорвано');
                document.getElementById('sendBtn').disabled = true;
                showNotification('Разрыв', 'Соединение потеряно', 'warning', 3000);
                activeConnections.delete(currentPeerId);
            };
            channel.onmessage = (event) => {
                receiveMessage(event.data);
            };
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            if (!dataChannel || dataChannel.readyState !== 'open') {
                showNotification('Ошибка', 'Соединение не установлено', 'error', 2000);
                return;
            }
            dataChannel.send(message);
            saveMessage(currentPeerId, message, true);
            input.value = '';
        }

        function receiveMessage(message) {
            if (currentPeerId) {
                saveMessage(currentPeerId, message, false);
                if (currentChat === currentPeerId) displayMessages(currentPeerId);
                showNotification('Новое сообщение', `${currentPeerId.substr(0, 12)}...`, 'info', 2000);
            }
        }

        function updateConnectionStatus(status, text) {
            document.getElementById('connectionStatus').textContent = text;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Добавляем поля для вставки запроса и ответа
        function addInputFields() {
            const container = document.querySelector('.requests-panel');
            
            const requestInputDiv = document.createElement('div');
            requestInputDiv.style.marginBottom = '15px';
            requestInputDiv.style.background = '#f0f0f0';
            requestInputDiv.style.borderRadius = '12px';
            requestInputDiv.style.padding = '12px';
            requestInputDiv.innerHTML = `
                <div style="font-size: 12px; font-weight: 600; margin-bottom: 8px;">📨 Вставить запрос от друга</div>
                <textarea id="incomingRequest" rows="2" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd; font-family:monospace; font-size:10px;" placeholder="Вставьте код запроса от друга"></textarea>
                <button class="btn btn-primary" style="margin-top: 8px; padding: 8px;" onclick="receiveRequestFromFriend(document.getElementById('incomingRequest').value)">✅ Принять запрос</button>
            `;
            
            const answerInputDiv = document.createElement('div');
            answerInputDiv.style.marginTop = '15px';
            answerInputDiv.style.background = '#f0f0f0';
            answerInputDiv.style.borderRadius = '12px';
            answerInputDiv.style.padding = '12px';
            answerInputDiv.innerHTML = `
                <div style="font-size: 12px; font-weight: 600; margin-bottom: 8px;">📨 Вставить ответ от друга</div>
                <textarea id="incomingAnswer" rows="2" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd; font-family:monospace; font-size:10px;" placeholder="Вставьте код ответа от друга"></textarea>
                <button class="btn btn-success" style="margin-top: 8px; padding: 8px;" onclick="handleAnswer(document.getElementById('incomingAnswer').value)">✅ Подтвердить</button>
            `;
            
            container.appendChild(requestInputDiv);
            container.appendChild(answerInputDiv);
        }

        // Инициализация
        document.getElementById('userId').textContent = myId;
        document.getElementById('avatar').textContent = myId.charAt(0);
        generateQR();
        updateChatsList();
        updateRequestsList();
        addInputFields();
        
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        
        showNotification('Готов к работе', 'Ваш ID: ' + myId, 'success', 4000);
    </script>
</body>
</html>
