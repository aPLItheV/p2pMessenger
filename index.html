<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>P2P Messenger - QR Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        /* Уведомления */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
            width: calc(100% - 40px);
            pointer-events: none;
        }

        .notification {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            pointer-events: auto;
            border-left: 4px solid;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .notification.success {
            border-left-color: #10b981;
        }
        .notification.error {
            border-left-color: #ef4444;
        }
        .notification.info {
            border-left-color: #3b82f6;
        }
        .notification.warning {
            border-left-color: #f59e0b;
        }

        .notification-icon {
            font-size: 24px;
        }
        .notification-content {
            flex: 1;
        }
        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .notification-message {
            font-size: 13px;
            color: #666;
        }
        .notification-close {
            cursor: pointer;
            font-size: 20px;
            color: #999;
            padding: 0 4px;
        }
        .notification-close:hover {
            color: #333;
        }

        /* Модальное окно запроса */
        .request-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            animation: fadeIn 0.2s ease;
        }

        .request-modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 90%;
            width: 360px;
            text-align: center;
        }

        .request-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: white;
        }

        .request-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .request-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-accept {
            background: #10b981;
            color: white;
        }
        .btn-reject {
            background: #ef4444;
            color: white;
        }

        /* Остальные стили */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sidebar {
            flex: 1;
            min-width: 320px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .chat-panel {
            flex: 2;
            min-width: 320px;
            background: white;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: calc(100vh - 140px);
        }

        .profile-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .user-id {
            font-family: monospace;
            background: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            word-break: break-all;
            margin: 12px 0;
            border: 1px solid #e0e0e0;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-outline {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .qr-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            display: inline-block;
            margin: 10px 0;
        }

        #qrcode {
            display: flex;
            justify-content: center;
        }

        canvas, #qrcode img {
            width: 200px;
            height: 200px;
        }

        .text-code {
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
        }

        .flex-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .flex-buttons .btn {
            flex: 1;
            margin-top: 0;
        }

        .chats-list {
            margin-top: 20px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chat-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .connection-status {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        #sendBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .grid { flex-direction: column; }
            .sidebar { min-width: auto; order: 2; }
            .chat-panel { min-width: auto; height: 60vh; order: 1; }
            .message { max-width: 90%; }
            .notification-container { top: 10px; right: 10px; max-width: calc(100% - 20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app">
        <div class="notification-container" id="notificationContainer"></div>
        
        <div class="header">
            <h1>🔗 P2P Messenger</h1>
            <p>QR код • Мгновенное подключение</p>
        </div>
        
        <div class="grid">
            <div class="sidebar">
                <div class="profile-card">
                    <div class="avatar" id="avatar">👤</div>
                    <h3>Ваш ID</h3>
                    <div class="user-id" id="userId"></div>
                    <div class="flex-buttons">
                        <button class="btn btn-outline" onclick="copyUserId()">📋 Копировать</button>
                        <button class="btn btn-outline" onclick="refreshQR()">🔄 Обновить QR</button>
                    </div>
                </div>

                <div class="qr-section">
                    <h3>📱 Ваш QR код</h3>
                    <div class="qr-container" id="qrcode"></div>
                    <div class="text-code" id="textCode"></div>
                    <div class="flex-buttons">
                        <button class="btn btn-outline" onclick="copyTextCode()">📋 Копировать код</button>
                        <button class="btn btn-outline" onclick="shareCode()">📤 Поделиться</button>
                    </div>
                </div>

                <div class="qr-section">
                    <h3>🔌 Подключиться к другу</h3>
                    <textarea id="connectCode" rows="2" placeholder="Вставьте код приглашения друга" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e0e0e0; margin:10px 0;"></textarea>
                    <button class="btn btn-primary" onclick="sendConnectionRequest()">📨 Отправить запрос</button>
                </div>

                <div class="chats-list">
                    <h3>💬 История чатов</h3>
                    <div id="chatsList"></div>
                </div>
            </div>
            
            <div class="chat-panel">
                <div class="chat-header">
                    <h3 id="chatTitle">Выберите чат</h3>
                    <div class="connection-status" id="connectionStatus">⚡ Не подключен</div>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <textarea id="messageInput" placeholder="Введите сообщение..." rows="2"></textarea>
                    <button id="sendBtn" onclick="sendMessage()" disabled>📨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        // Глобальные переменные
        let peerConnection = null;
        let dataChannel = null;
        let currentPeerId = null;
        let myId = generateUserId();
        let pendingRequests = new Map(); // Храним ожидающие запросы
        let activeConnections = new Map(); // Активные соединения
        
        // Хранилище чатов
        let chats = loadChats();
        let currentChat = null;

        // Уведомления
        function showNotification(title, message, type = 'info', duration = 4000) {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            const icons = {
                success: '✅',
                error: '❌',
                info: 'ℹ️',
                warning: '⚠️'
            };
            
            notification.innerHTML = `
                <div class="notification-icon">${icons[type] || 'ℹ️'}</div>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close" onclick="this.parentElement.remove()">✕</div>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }

        // Генерация ID
        function generateUserId() {
            let saved = localStorage.getItem('myUserId');
            if (saved) return saved;
            const random = Math.random().toString(36).substr(2, 10);
            const timestamp = Date.now().toString(36);
            const newId = `${random}${timestamp}`.toUpperCase();
            localStorage.setItem('myUserId', newId);
            return newId;
        }

        // Загрузка чатов
        function loadChats() {
            const saved = localStorage.getItem('p2pChats');
            if (saved) {
                const chats = JSON.parse(saved);
                for (let id in chats) {
                    if (chats[id].messages) {
                        chats[id].messages = chats[id].messages.map(m => ({
                            ...m,
                            timestamp: new Date(m.timestamp)
                        }));
                    }
                }
                return chats;
            }
            return {};
        }

        // Сохранение чатов
        function saveChats() {
            const toSave = {};
            for (let id in chats) {
                toSave[id] = {
                    ...chats[id],
                    messages: chats[id].messages.map(m => ({
                        ...m,
                        timestamp: m.timestamp.toISOString()
                    }))
                };
            }
            localStorage.setItem('p2pChats', JSON.stringify(toSave));
        }

        // Сохранение сообщения
        function saveMessage(peerId, message, isSent) {
            if (!chats[peerId]) {
                chats[peerId] = {
                    name: peerId,
                    lastSeen: new Date(),
                    messages: []
                };
            }
            chats[peerId].messages.push({
                text: message,
                isSent: isSent,
                timestamp: new Date()
            });
            chats[peerId].lastSeen = new Date();
            saveChats();
            updateChatsList();
            
            if (currentChat === peerId) {
                displayMessages(peerId);
            }
        }

        // Обновление списка чатов
        function updateChatsList() {
            const container = document.getElementById('chatsList');
            const sorted = Object.entries(chats).sort((a, b) => b[1].lastSeen - a[1].lastSeen);
            
            container.innerHTML = sorted.map(([id, chat]) => `
                <div class="chat-item ${currentChat === id ? 'active' : ''}" onclick="selectChat('${id}')">
                    <div>
                        <div class="chat-name">${id.substr(0, 12)}...</div>
                        <div class="chat-time">${formatTime(chat.lastSeen)}</div>
                    </div>
                    <div>💬 ${chat.messages.length}</div>
                </div>
            `).join('');
            
            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">Нет чатов</div>';
            }
        }

        // Выбор чата
        function selectChat(peerId) {
            currentChat = peerId;
            currentPeerId = peerId;
            document.getElementById('chatTitle').textContent = `Чат с: ${peerId.substr(0, 12)}...`;
            displayMessages(peerId);
            updateChatsList();
            
            // Проверяем активное соединение
            if (activeConnections.has(peerId)) {
                updateConnectionStatus('connected', '✅ Подключено');
                document.getElementById('sendBtn').disabled = false;
            } else {
                updateConnectionStatus('disconnected', '❌ Не подключен');
                document.getElementById('sendBtn').disabled = true;
            }
        }

        // Отображение сообщений
        function displayMessages(peerId) {
            const container = document.getElementById('messages');
            const messages = chats[peerId]?.messages || [];
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.isSent ? 'sent' : 'received'}">
                    <div class="message-info">${msg.isSent ? 'Вы' : peerId.substr(0, 8)} • ${formatTime(msg.timestamp)}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(date) {
            const d = new Date(date);
            const now = new Date();
            if (d.toDateString() === now.toDateString()) {
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return d.toLocaleDateString();
        }

        // Генерация QR кода
        function generateConnectionCode() {
            const connectionData = {
                type: 'connection_request',
                from: myId,
                timestamp: Date.now()
            };
            
            const code = JSON.stringify(connectionData);
            const textCodeElem = document.getElementById('textCode');
            textCodeElem.textContent = code;
            
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';
            new QRCode(qrcodeDiv, {
                text: code,
                width: 200,
                height: 200,
                colorDark: '#667eea',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            
            return code;
        }

        function refreshQR() {
            generateConnectionCode();
            showNotification('QR обновлен', 'Новый QR код сгенерирован', 'success', 2000);
        }

        function copyTextCode() {
            const code = document.getElementById('textCode').textContent;
            navigator.clipboard.writeText(code);
            showNotification('Скопировано', 'Код скопирован в буфер обмена', 'success', 2000);
        }

        function shareCode() {
            const code = document.getElementById('textCode').textContent;
            if (navigator.share) {
                navigator.share({
                    title: 'P2P Messenger приглашение',
                    text: code
                });
            } else {
                copyTextCode();
            }
        }

        // Отправка запроса на подключение
        async function sendConnectionRequest() {
            const code = document.getElementById('connectCode').value.trim();
            if (!code) {
                showNotification('Ошибка', 'Введите код приглашения', 'error', 3000);
                return;
            }
            
            try {
                const data = JSON.parse(code);
                if (data.type === 'connection_request') {
                    showNotification('Запрос отправлен', `Отправляем запрос пользователю ${data.from.substr(0, 12)}...`, 'info', 2000);
                    await initiateConnection(data.from);
                } else {
                    throw new Error('Неверный формат');
                }
            } catch (e) {
                showNotification('Ошибка', 'Неверный формат кода приглашения', 'error', 3000);
            }
        }

        // Инициализация соединения
        async function initiateConnection(targetId) {
            if (activeConnections.has(targetId)) {
                showNotification('Уже подключены', 'Вы уже связаны с этим пользователем', 'warning', 3000);
                return;
            }
            
            currentPeerId = targetId;
            updateConnectionStatus('connecting', '🔄 Установка соединения...');
            showNotification('Подключение', `Устанавливаем соединение с ${targetId.substr(0, 12)}...`, 'info', 2000);
            
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            dataChannel = peerConnection.createDataChannel('chat');
            setupDataChannel(dataChannel);
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await waitForIceGathering();
                
                const offerData = {
                    type: 'offer',
                    sdp: peerConnection.localDescription.sdp,
                    from: myId,
                    to: targetId
                };
                
                // Сохраняем offer для ожидания ответа
                pendingRequests.set(targetId, {
                    offer: offerData,
                    timestamp: Date.now()
                });
                
                // Показываем offer пользователю для отправки
                showOfferModal(offerData);
                
            } catch (error) {
                console.error(error);
                showNotification('Ошибка', 'Не удалось создать приглашение', 'error', 3000);
                updateConnectionStatus('error', '❌ Ошибка');
            }
        }

        // Показ offer в модалке
        function showOfferModal(offerData) {
            const offerText = JSON.stringify(offerData);
            const modal = document.createElement('div');
            modal.className = 'request-modal';
            modal.innerHTML = `
                <div class="request-modal-content">
                    <div class="request-avatar">📨</div>
                    <h3>Отправьте приглашение</h3>
                    <p style="margin: 10px 0; color: #666; font-size: 14px;">Скопируйте этот код и отправьте собеседнику любым способом</p>
                    <textarea readonly style="width:100%; height:120px; margin:10px 0; padding:8px; font-family:monospace; font-size:10px; border:1px solid #ddd; border-radius:8px;">${offerText}</textarea>
                    <div class="flex-buttons">
                        <button class="btn btn-primary" onclick="copyToClipboard('${offerText.replace(/'/g, "\\'")}'); this.closest('.request-modal').remove(); showNotification('Скопировано', 'Код приглашения скопирован', 'success', 2000);">📋 Копировать</button>
                        <button class="btn btn-outline" onclick="this.closest('.request-modal').remove();">Закрыть</button>
                    </div>
                    <p style="margin-top: 10px; font-size: 12px; color: #999;">После получения ответа вставьте его ниже</p>
                    <textarea id="answerInput" placeholder="Вставьте ответ собеседника" style="width:100%; margin-top:10px; padding:8px; border-radius:8px; border:1px solid #ddd;"></textarea>
                    <button class="btn btn-success" style="margin-top:10px;" onclick="submitAnswer()">✅ Подтвердить</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // Отправка ответа
        window.submitAnswer = function() {
            const answerInput = document.getElementById('answerInput');
            const answer = answerInput?.value.trim();
            if (answer) {
                handleAnswer(answer);
                document.querySelector('.request-modal')?.remove();
            } else {
                showNotification('Ошибка', 'Вставьте ответ от собеседника', 'error', 2000);
            }
        };

        // Получение offer (входящий запрос)
        function receiveOffer(offerData) {
            const fromId = offerData.from;
            
            // Показываем модальное окно с запросом
            const modal = document.createElement('div');
            modal.className = 'request-modal';
            modal.innerHTML = `
                <div class="request-modal-content">
                    <div class="request-avatar">👤</div>
                    <h3>Входящий запрос</h3>
                    <p style="margin: 10px 0; font-size: 14px;">Пользователь <strong>${fromId.substr(0, 16)}...</strong> хочет связаться с вами</p>
                    <div class="request-buttons">
                        <button class="btn-accept" onclick="acceptConnectionRequest('${fromId.replace(/'/g, "\\'")}')">✅ Принять</button>
                        <button class="btn-reject" onclick="this.closest('.request-modal').remove(); showNotification('Отклонено', 'Вы отклонили запрос на подключение', 'info', 2000);">❌ Отклонить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            showNotification('Новый запрос', `${fromId.substr(0, 12)}... хочет подключиться`, 'info', 5000);
            
            // Сохраняем offer для принятия
            pendingRequests.set(fromId, { offer: offerData, type: 'incoming' });
        }

        // Принятие запроса на подключение
        window.acceptConnectionRequest = async function(fromId) {
            const request = pendingRequests.get(fromId);
            if (!request || !request.offer) {
                showNotification('Ошибка', 'Запрос не найден', 'error', 3000);
                return;
            }
            
            document.querySelector('.request-modal')?.remove();
            showNotification('Принято', `Вы приняли запрос от ${fromId.substr(0, 12)}...`, 'success', 2000);
            
            currentPeerId = fromId;
            updateConnectionStatus('connecting', '🔄 Установка соединения...');
            
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel(dataChannel);
            };
            
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(request.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await waitForIceGathering();
                
                const answerData = {
                    type: 'answer',
                    sdp: peerConnection.localDescription.sdp,
                    from: myId,
                    to: fromId
                };
                
                // Показываем ответ для отправки
                showAnswerModal(answerData);
                
            } catch (error) {
                console.error(error);
                showNotification('Ошибка', 'Не удалось создать ответ', 'error', 3000);
            }
        };

        // Показ ответа
        function showAnswerModal(answerData) {
            const answerText = JSON.stringify(answerData);
            const modal = document.createElement('div');
            modal.className = 'request-modal';
            modal.innerHTML = `
                <div class="request-modal-content">
                    <div class="request-avatar">📤</div>
                    <h3>Отправьте ответ</h3>
                    <p style="margin: 10px 0; color: #666;">Скопируйте этот код и отправьте собеседнику</p>
                    <textarea readonly style="width:100%; height:120px; margin:10px 0; padding:8px; font-family:monospace; font-size:10px;">${answerText}</textarea>
                    <button class="btn btn-primary" onclick="copyToClipboard('${answerText.replace(/'/g, "\\'")}'); this.closest('.request-modal').remove(); showNotification('Скопировано', 'Ответ скопирован', 'success', 2000);">📋 Копировать</button>
                    <button class="btn btn-outline" onclick="this.closest('.request-modal').remove();">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // Обработка ответа
        async function handleAnswer(answerText) {
            try {
                const answerData = JSON.parse(answerText);
                if (answerData.type === 'answer' && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answerData));
                    updateConnectionStatus('connected', '✅ Подключено!');
                    document.getElementById('sendBtn').disabled = false;
                    showNotification('Успешно', 'Соединение установлено!', 'success', 3000);
                    
                    activeConnections.set(currentPeerId, peerConnection);
                    
                    if (!chats[currentPeerId]) {
                        chats[currentPeerId] = { name: currentPeerId, messages: [], lastSeen: new Date() };
                        saveChats();
                    }
                    updateChatsList();
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка', 'Неверный формат ответа', 'error', 3000);
            }
        }

        function waitForIceGathering() {
            return new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') {
                    resolve();
                } else {
                    peerConnection.onicegatheringstatechange = () => {
                        if (peerConnection.iceGatheringState === 'complete') resolve();
                    };
                }
            });
        }

        function setupDataChannel(channel) {
            channel.onopen = () => {
                updateConnectionStatus('connected', '✅ Подключено!');
                document.getElementById('sendBtn').disabled = false;
                showNotification('Соединение установлено', 'Теперь вы можете общаться', 'success', 3000);
                activeConnections.set(currentPeerId, peerConnection);
            };
            
            channel.onclose = () => {
                updateConnectionStatus('disconnected', '❌ Разорвано');
                document.getElementById('sendBtn').disabled = true;
                activeConnections.delete(currentPeerId);
                showNotification('Разрыв соединения', 'Связь с собеседником потеряна', 'warning', 3000);
            };
            
            channel.onmessage = (event) => {
                receiveMessage(event.data);
                showNotification('Новое сообщение', `От ${currentPeerId?.substr(0, 12)}...`, 'info', 2000);
            };
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            if (!dataChannel || dataChannel.readyState !== 'open') {
                showNotification('Ошибка', 'Соединение не установлено', 'error', 3000);
                return;
            }
            
            dataChannel.send(message);
            saveMessage(currentPeerId, message, true);
            input.value = '';
        }

        function receiveMessage(message) {
            if (currentPeerId) {
                saveMessage(currentPeerId, message, false);
                if (currentChat === currentPeerId) {
                    displayMessages(currentPeerId);
                }
            }
        }

        function updateConnectionStatus(status, text) {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.textContent = text;
        }

        function copyUserId() {
            navigator.clipboard.writeText(myId);
            showNotification('Скопировано', 'Ваш ID скопирован в буфер', 'success', 2000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Обработка входящих сообщений (глобальный обработчик)
        window.addEventListener('message', (event) => {
            // Для демо: можно обрабатывать postMessage если нужно
        });

        // Инициализация
        document.getElementById('userId').textContent = myId;
        document.getElementById('avatar').textContent = myId.charAt(0);
        generateConnectionCode();
        updateChatsList();
        
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        
        // Обработка вставки offer
        window.pasteOffer = function() {
            const offer = prompt('Вставьте приглашение от друга:');
            if (offer) {
                try {
                    const offerData = JSON.parse(offer);
                    if (offerData.type === 'offer') {
                        receiveOffer(offerData);
                    } else {
                        showNotification('Ошибка', 'Неверный формат приглашения', 'error', 3000);
                    }
                } catch(e) {
                    showNotification('Ошибка', 'Неверный формат данных', 'error', 3000);
                }
            }
        };
        
        showNotification('Готов к работе', 'Ваш ID: ' + myId.substr(0, 12) + '...', 'success', 4000);
        console.log('✅ P2P Messenger готов! Ваш ID:', myId);
    </script>
</body>
</html>
