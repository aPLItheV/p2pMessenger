<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>P2P Messenger - QR Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Уведомления */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
            width: calc(100% - 40px);
            pointer-events: none;
        }

        .notification {
            background: white;
            border-radius: 16px;
            padding: 14px 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            pointer-events: auto;
            border-left: 4px solid;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification.success { border-left-color: #10b981; }
        .notification.error { border-left-color: #ef4444; }
        .notification.info { border-left-color: #3b82f6; }
        .notification.warning { border-left-color: #f59e0b; }

        .notification-icon { font-size: 22px; }
        .notification-content { flex: 1; }
        .notification-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .notification-message { font-size: 12px; color: #666; }
        .notification-close { cursor: pointer; font-size: 18px; color: #999; }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .header h1 { font-size: 1.6rem; margin-bottom: 6px; }
        .header p { opacity: 0.9; font-size: 0.85rem; }

        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sidebar {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .chat-panel {
            flex: 2;
            min-width: 300px;
            background: white;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: calc(100vh - 140px);
        }

        .profile-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 24px;
            color: white;
        }

        .user-id {
            font-family: monospace;
            background: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 11px;
            word-break: break-all;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success { background: #10b981; color: white; }
        .btn-outline { background: white; border: 2px solid #667eea; color: #667eea; }
        .btn-danger { background: #ef4444; color: white; }

        .qr-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            margin: 10px auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Улучшенный QR код - больший размер и четкость */
        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #qrcode canvas, #qrcode img {
            width: 220px !important;
            height: 220px !important;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .text-code {
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            background: white;
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
            border: 1px solid #e0e0e0;
        }

        /* Панель запросов */
        .requests-panel {
            margin-top: 20px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .requests-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .request-card {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        .request-user {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .request-time {
            font-size: 10px;
            color: #666;
            margin-bottom: 12px;
        }

        .request-buttons {
            display: flex;
            gap: 10px;
        }

        .request-buttons button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .accept-request {
            background: #10b981;
            color: white;
        }

        .reject-request {
            background: #ef4444;
            color: white;
        }

        .no-requests {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 13px;
        }

        .chats-list {
            margin-top: 20px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .connection-status { font-size: 12px; opacity: 0.9; margin-top: 4px; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-info { font-size: 10px; margin-bottom: 4px; opacity: 0.7; }

        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        #sendBtn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Кнопка увеличения QR */
        .qr-zoom-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* Модальное окно для увеличенного QR */
        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            cursor: pointer;
        }
        .qr-modal-content {
            text-align: center;
            padding: 20px;
        }
        .qr-modal-content canvas, .qr-modal-content img {
            width: 90vw !important;
            height: 90vw !important;
            max-width: 500px;
            max-height: 500px;
            background: white;
            padding: 20px;
            border-radius: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .grid { flex-direction: column; }
            .sidebar { min-width: auto; order: 2; }
            .chat-panel { min-width: auto; height: 55vh; order: 1; }
            .message { max-width: 90%; }
            .notification-container { top: 10px; right: 10px; max-width: calc(100% - 20px); }
            #qrcode canvas, #qrcode img {
                width: 180px !important;
                height: 180px !important;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app">
        <div class="notification-container" id="notificationContainer"></div>
        
        <div class="header">
            <h1>🔗 P2P Messenger</h1>
            <p>Наведи камеру на QR код друга</p>
        </div>
        
        <div class="grid">
            <div class="sidebar">
                <div class="profile-card">
                    <div class="avatar" id="avatar">👤</div>
                    <h3>Ваш ID</h3>
                    <div class="user-id" id="userId"></div>
                    <button class="btn btn-outline" onclick="copyUserId()">📋 Копировать ID</button>
                </div>

                <div class="qr-section">
                    <h3>📱 Ваш QR код</h3>
                    <p style="font-size: 12px; color: #666; margin-bottom: 8px;">Друг сканирует для подключения</p>
                    <div class="qr-container" id="qrcode"></div>
                    <button class="qr-zoom-btn" onclick="zoomQR()">🔍 Нажми для увеличения</button>
                    <div class="text-code" id="textCode"></div>
                    <button class="btn btn-outline" onclick="copyTextCode()">📋 Копировать код (если не сканируется)</button>
                </div>

                <div class="qr-section">
                    <h3>🔌 Подключиться к другу</h3>
                    <textarea id="connectCode" rows="2" placeholder="Вставьте код друга или отсканируйте QR" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e0e0e0; margin:10px 0; font-size: 11px;"></textarea>
                    <button class="btn btn-primary" onclick="sendConnectionRequest()">📨 Отправить запрос</button>
                </div>

                <!-- Панель входящих запросов -->
                <div class="requests-panel">
                    <div class="requests-title">
                        <span>📞 Входящие запросы</span>
                        <span id="requestsCount" style="background: #ef4444; color: white; padding: 2px 8px; border-radius: 20px; font-size: 11px;">0</span>
                    </div>
                    <div id="requestsList"></div>
                </div>

                <div class="chats-list">
                    <h3>💬 История чатов</h3>
                    <div id="chatsList"></div>
                </div>
            </div>
            
            <div class="chat-panel">
                <div class="chat-header">
                    <h3 id="chatTitle">Выберите чат</h3>
                    <div class="connection-status" id="connectionStatus">⚡ Не подключен</div>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <textarea id="messageInput" placeholder="Введите сообщение..." rows="2"></textarea>
                    <button id="sendBtn" onclick="sendMessage()" disabled>📨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ]
        };

        // Переменные
        let peerConnection = null;
        let dataChannel = null;
        let currentPeerId = null;
        let myId = generateUserId();
        let pendingRequests = [];
        let nextRequestId = 1;
        let activeConnections = new Map();
        let currentQRData = null;
        
        let chats = loadChats();
        let currentChat = null;

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(title, message, type = 'info', duration = 3500) {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            notification.innerHTML = `
                <div class="notification-icon">${icons[type] || 'ℹ️'}</div>
                <div class="notification-content">
                    <div class="notification-title">${title}</div>
                    <div class="notification-message">${message}</div>
                </div>
                <div class="notification-close" onclick="this.parentElement.remove()">✕</div>
            `;
            container.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }

        // ========== ХРАНЕНИЕ ==========
        function generateUserId() {
            let saved = localStorage.getItem('myUserId');
            if (saved) return saved;
            // Делаем ID короче для QR
            const random = Math.random().toString(36).substr(2, 8);
            const timestamp = Date.now().toString(36).substr(-6);
            const newId = `${random}${timestamp}`.toUpperCase();
            localStorage.setItem('myUserId', newId);
            return newId;
        }

        function loadChats() {
            const saved = localStorage.getItem('p2pChats');
            if (saved) {
                const chats = JSON.parse(saved);
                for (let id in chats) {
                    if (chats[id].messages) {
                        chats[id].messages = chats[id].messages.map(m => ({
                            ...m,
                            timestamp: new Date(m.timestamp)
                        }));
                    }
                }
                return chats;
            }
            return {};
        }

        function saveChats() {
            const toSave = {};
            for (let id in chats) {
                toSave[id] = {
                    ...chats[id],
                    messages: chats[id].messages.map(m => ({
                        ...m,
                        timestamp: m.timestamp.toISOString()
                    }))
                };
            }
            localStorage.setItem('p2pChats', JSON.stringify(toSave));
        }

        function saveMessage(peerId, message, isSent) {
            if (!chats[peerId]) {
                chats[peerId] = { name: peerId, lastSeen: new Date(), messages: [] };
            }
            chats[peerId].messages.push({ text: message, isSent, timestamp: new Date() });
            chats[peerId].lastSeen = new Date();
            saveChats();
            updateChatsList();
            if (currentChat === peerId) displayMessages(peerId);
        }

        function updateChatsList() {
            const container = document.getElementById('chatsList');
            const sorted = Object.entries(chats).sort((a, b) => b[1].lastSeen - a[1].lastSeen);
            container.innerHTML = sorted.map(([id, chat]) => `
                <div class="chat-item ${currentChat === id ? 'active' : ''}" onclick="selectChat('${id}')">
                    <div><div class="chat-name">${id.substr(0, 12)}...</div></div>
                    <div>💬 ${chat.messages.length}</div>
                </div>
            `).join('');
            if (sorted.length === 0) container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">Нет чатов</div>';
        }

        function selectChat(peerId) {
            currentChat = peerId;
            currentPeerId = peerId;
            document.getElementById('chatTitle').textContent = `Чат с: ${peerId.substr(0, 12)}...`;
            displayMessages(peerId);
            updateChatsList();
            
            const conn = activeConnections.get(peerId);
            if (conn && conn.dc && conn.dc.readyState === 'open') {
                document.getElementById('sendBtn').disabled = false;
                updateConnectionStatus('connected', '✅ Подключено');
            } else {
                document.getElementById('sendBtn').disabled = true;
                updateConnectionStatus('disconnected', '❌ Не подключен');
            }
        }

        function displayMessages(peerId) {
            const container = document.getElementById('messages');
            const messages = chats[peerId]?.messages || [];
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.isSent ? 'sent' : 'received'}">
                    <div class="message-info">${msg.isSent ? 'Вы' : peerId.substr(0, 8)} • ${formatTime(msg.timestamp)}</div>
                    <div>${escapeHtml(msg.text)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(date) {
            const d = new Date(date);
            const now = new Date();
            if (d.toDateString() === now.toDateString()) {
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return d.toLocaleDateString();
        }

        // ========== УЛУЧШЕННЫЙ QR КОД ==========
        async function generateQRWithOffer() {
            const pc = new RTCPeerConnection(configuration);
            const dc = pc.createDataChannel('chat');
            
            return new Promise(async (resolve) => {
                let offerData = null;
                
                pc.onicecandidate = (event) => {
                    if (event.candidate === null && offerData) {
                        resolve(offerData);
                    }
                };
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                // Уменьшаем время ожидания для более быстрого QR
                setTimeout(() => {
                    if (pc.localDescription) {
                        offerData = {
                            t: 'o', // сокращенный тип
                            s: pc.localDescription.sdp,
                            f: myId
                        };
                        resolve(offerData);
                    }
                }, 800);
            });
        }

        async function updateQR() {
            showNotification('Генерация QR', 'Создаем приглашение...', 'info', 1000);
            const offerData = await generateQRWithOffer();
            currentQRData = offerData;
            
            // Кодируем в компактный JSON без пробелов
            const code = JSON.stringify(offerData);
            
            document.getElementById('textCode').textContent = code;
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';
            
            // Создаем QR с максимальным качеством
            try {
                new QRCode(qrcodeDiv, {
                    text: code,
                    width: 260,
                    height: 260,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
                
                // Улучшаем четкость через CSS
                setTimeout(() => {
                    const canvas = qrcodeDiv.querySelector('canvas');
                    if (canvas) {
                        canvas.style.width = '220px';
                        canvas.style.height = '220px';
                        canvas.style.imageRendering = 'crisp-edges';
                    }
                }, 100);
                
                showNotification('Готово', 'QR код создан, друг может сканировать', 'success', 2000);
            } catch(e) {
                console.error(e);
                showNotification('Ошибка', 'Не удалось создать QR', 'error', 2000);
            }
        }

        function zoomQR() {
            const qrcodeDiv = document.getElementById('qrcode');
            const clone = qrcodeDiv.cloneNode(true);
            
            const modal = document.createElement('div');
            modal.className = 'qr-modal';
            modal.onclick = () => modal.remove();
            modal.innerHTML = `
                <div class="qr-modal-content" onclick="event.stopPropagation()">
                    ${clone.outerHTML}
                    <p style="color: white; margin-top: 20px; font-size: 14px;">Нажмите в любом месте для закрытия</p>
                </div>
            `;
            
            // Увеличиваем размер в модалке
            setTimeout(() => {
                const canvas = modal.querySelector('canvas');
                if (canvas) {
                    canvas.style.width = '80vw';
                    canvas.style.height = '80vw';
                    canvas.style.maxWidth = '400px';
                    canvas.style.maxHeight = '400px';
                }
            }, 10);
            
            document.body.appendChild(modal);
        }

        function copyTextCode() {
            const code = document.getElementById('textCode').textContent;
            if (code) {
                navigator.clipboard.writeText(code);
                showNotification('Скопировано', 'Код скопирован, отправьте другу', 'success', 1500);
            }
        }

        function copyUserId() {
            navigator.clipboard.writeText(myId);
            showNotification('Скопировано', 'Ваш ID скопирован', 'success', 1500);
        }

        // ========== ОТПРАВКА ЗАПРОСА ==========
        async function sendConnectionRequest() {
            let code = document.getElementById('connectCode').value.trim();
            if (!code) {
                showNotification('Ошибка', 'Вставьте код приглашения или отсканируйте QR', 'error', 2000);
                return;
            }
            
            try {
                let offerData = JSON.parse(code);
                // Поддержка старого и нового формата
                if (offerData.t === 'o') {
                    offerData = { type: 'offer', sdp: offerData.s, from: offerData.f };
                }
                
                if (offerData.type !== 'offer') throw new Error('Неверный формат');
                if (offerData.from === myId) {
                    showNotification('Ошибка', 'Это ваш собственный QR код', 'warning', 2000);
                    return;
                }
                
                showNotification('Запрос отправлен', `Отправляем запрос пользователю ${offerData.from.substr(0, 12)}...`, 'success', 2000);
                
                addIncomingRequest(offerData.from, offerData);
                document.getElementById('connectCode').value = '';
                
            } catch (e) {
                showNotification('Ошибка', 'Неверный формат кода. Попробуйте отсканировать QR заново', 'error', 3000);
            }
        }

        function addIncomingRequest(fromId, offerData) {
            const existing = pendingRequests.find(r => r.from === fromId);
            if (existing) {
                showNotification('Повторный запрос', `${fromId.substr(0, 12)}... уже отправил запрос`, 'warning', 2000);
                return;
            }
            
            const request = {
                id: nextRequestId++,
                from: fromId,
                offer: offerData,
                timestamp: new Date()
            };
            pendingRequests.push(request);
            updateRequestsList();
            
            showNotification('🔔 Новый запрос!', `${fromId.substr(0, 12)}... хочет с вами связаться`, 'info', 5000);
        }

        function updateRequestsList() {
            const container = document.getElementById('requestsList');
            const countSpan = document.getElementById('requestsCount');
            countSpan.textContent = pendingRequests.length;
            
            if (pendingRequests.length === 0) {
                container.innerHTML = '<div class="no-requests">Нет входящих запросов</div>';
                return;
            }
            
            container.innerHTML = pendingRequests.map(req => `
                <div class="request-card" id="request-${req.id}">
                    <div class="request-user">👤 ${req.from.substr(0, 20)}...</div>
                    <div class="request-time">${formatTime(req.timestamp)}</div>
                    <div class="request-buttons">
                        <button class="accept-request" onclick="acceptRequest(${req.id})">✅ Принять</button>
                        <button class="reject-request" onclick="rejectRequest(${req.id})">❌ Отклонить</button>
                    </div>
                </div>
            `).join('');
        }

        window.acceptRequest = async function(requestId) {
            const request = pendingRequests.find(r => r.id === requestId);
            if (!request) return;
            
            pendingRequests = pendingRequests.filter(r => r.id !== requestId);
            updateRequestsList();
            
            currentPeerId = request.from;
            showNotification('Принято', `Подключаемся к ${currentPeerId.substr(0, 12)}...`, 'success', 2000);
            updateConnectionStatus('connecting', '🔄 Установка соединения...');
            
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel(dataChannel);
            };
            
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(request.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await waitForIceGathering();
                
                const answerData = {
                    type: 'answer',
                    sdp: peerConnection.localDescription.sdp,
                    from: myId,
                    to: currentPeerId
                };
                
                const answerText = JSON.stringify(answerData);
                showAnswerDialog(answerText);
                
            } catch (error) {
                console.error(error);
                showNotification('Ошибка', 'Не удалось создать соединение', 'error', 3000);
                updateConnectionStatus('error', '❌ Ошибка');
            }
        };

        window.rejectRequest = function(requestId) {
            const request = pendingRequests.find(r => r.id === requestId);
            if (request) {
                pendingRequests = pendingRequests.filter(r => r.id !== requestId);
                updateRequestsList();
                showNotification('Отклонено', `Вы отклонили запрос от ${request.from.substr(0, 12)}...`, 'info', 2000);
            }
        };

        function showAnswerDialog(answerText) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.85);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10001;
            `;
            modal.innerHTML = `
                <div style="background: white; border-radius: 28px; padding: 24px; max-width: 90%; width: 340px; text-align: center;">
                    <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px;">✅</div>
                    <h3>Соединение готово!</h3>
                    <p style="margin: 12px 0; font-size: 13px;">Скопируйте этот код и отправьте собеседнику:</p>
                    <textarea readonly style="width:100%; height:100px; margin:10px 0; padding:8px; font-family:monospace; font-size:10px; border:1px solid #ddd; border-radius:12px;">${answerText}</textarea>
                    <button class="btn btn-primary" onclick="copyAndClose('${answerText.replace(/'/g, "\\'")}', this)">📋 Копировать</button>
                    <button class="btn btn-outline" style="margin-top: 8px;" onclick="this.closest('div').parentElement.remove()">Закрыть</button>
                    <p style="margin-top: 12px; font-size: 11px; color: #999;">После отправки кода, ждите пока друг его вставит</p>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function copyAndClose(text, btn) {
            navigator.clipboard.writeText(text);
            showNotification('Скопировано', 'Код скопирован, отправьте другу', 'success', 2000);
            const modal = btn.closest('div').parentElement.parentElement;
            if (modal) modal.remove();
            showAnswerInput();
        }

        function showAnswerInput() {
            const container = document.querySelector('.qr-section:last-child');
            const existing = document.getElementById('answerInputBtn');
            if (existing) return;
            
            const answerDiv = document.createElement('div');
            answerDiv.id = 'answerInputBtn';
            answerDiv.style.marginTop = '10px';
            answerDiv.innerHTML = `
                <button class="btn btn-success" onclick="openAnswerDialog()">📨 Вставить ответ от друга</button>
            `;
            container.appendChild(answerDiv);
        }

        window.openAnswerDialog = function() {
            const answer = prompt('Вставьте код-ответ от собеседника:');
            if (answer) {
                handleAnswer(answer);
            }
        };

        async function handleAnswer(answerText) {
            try {
                const answerData = JSON.parse(answerText);
                if (answerData.type === 'answer' && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answerData));
                    updateConnectionStatus('connected', '✅ Подключено!');
                    document.getElementById('sendBtn').disabled = false;
                    showNotification('Успешно!', 'Соединение установлено!', 'success', 3000);
                    
                    activeConnections.set(currentPeerId, { pc: peerConnection, dc: dataChannel });
                    
                    if (!chats[currentPeerId]) {
                        chats[currentPeerId] = { name: currentPeerId, messages: [], lastSeen: new Date() };
                        saveChats();
                    }
                    updateChatsList();
                    selectChat(currentPeerId);
                }
            } catch (error) {
                console.error(error);
                showNotification('Ошибка', 'Неверный формат ответа', 'error', 3000);
            }
        }

        function waitForIceGathering() {
            return new Promise((resolve) => {
                if (peerConnection.iceGatheringState === 'complete') {
                    resolve();
                } else {
                    peerConnection.onicegatheringstatechange = () => {
                        if (peerConnection.iceGatheringState === 'complete') resolve();
                    };
                }
            });
        }

        function setupDataChannel(channel) {
            dataChannel = channel;
            channel.onopen = () => {
                updateConnectionStatus('connected', '✅ Подключено!');
                document.getElementById('sendBtn').disabled = false;
                showNotification('Соединение установлено', 'Можно общаться', 'success', 3000);
                activeConnections.set(currentPeerId, { pc: peerConnection, dc: dataChannel });
            };
            channel.onclose = () => {
                updateConnectionStatus('disconnected', '❌ Разорвано');
                document.getElementById('sendBtn').disabled = true;
                showNotification('Разрыв', 'Соединение потеряно', 'warning', 3000);
                activeConnections.delete(currentPeerId);
            };
            channel.onmessage = (event) => {
                receiveMessage(event.data);
                showNotification('Новое сообщение', `От ${currentPeerId?.substr(0, 12)}`, 'info', 2000);
            };
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            if (!dataChannel || dataChannel.readyState !== 'open') {
                showNotification('Ошибка', 'Соединение не установлено', 'error', 2000);
                return;
            }
            dataChannel.send(message);
            saveMessage(currentPeerId, message, true);
            input.value = '';
        }

        function receiveMessage(message) {
            if (currentPeerId) {
                saveMessage(currentPeerId, message, false);
                if (currentChat === currentPeerId) displayMessages(currentPeerId);
            }
        }

        function updateConnectionStatus(status, text) {
            document.getElementById('connectionStatus').textContent = text;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.getElementById('userId').textContent = myId;
        document.getElementById('avatar').textContent = myId.charAt(0);
        updateQR();
        updateChatsList();
        updateRequestsList();
        
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        
        showNotification('Готов к работе', 'QR код увеличен для лучшего сканирования', 'success', 4000);
    </script>
</body>
</html>
