<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>P2P Messenger - QR Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .header h1 { font-size: 1.6rem; margin-bottom: 6px; }
        .header p { opacity: 0.9; font-size: 0.85rem; }

        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sidebar {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .chat-panel {
            flex: 2;
            min-width: 280px;
            background: white;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: calc(100vh - 140px);
        }

        .profile-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 24px;
            color: white;
        }

        .user-id {
            font-family: monospace;
            background: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 11px;
            word-break: break-all;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .qr-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 16px;
            display: inline-block;
            margin: 10px auto;
        }

        #qrcode canvas, #qrcode img {
            width: 200px !important;
            height: 200px !important;
        }

        .scan-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .scan-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            font-size: 12px;
            margin: 10px 0;
        }

        .chats-list {
            margin-top: 20px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
        }
        .chat-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .connection-status {
            font-size: 12px;
            margin-top: 4px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        #sendBtn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Модальное окно запроса */
        .request-modal {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            max-width: 400px;
            margin: 0 auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .request-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .request-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .grid { flex-direction: column; }
            .chat-panel { height: 50vh; }
            #qrcode canvas, #qrcode img { width: 160px !important; height: 160px !important; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🔗 P2P Messenger</h1>
            <p>Отсканируй QR → прими запрос → общайся</p>
        </div>
        
        <div class="grid">
            <div class="sidebar">
                <div class="profile-card">
                    <div class="avatar" id="avatar">👤</div>
                    <h3>Ваш ID</h3>
                    <div class="user-id" id="userId"></div>
                    <button class="btn btn-primary" onclick="copyUserId()">📋 Копировать ID</button>
                </div>

                <div class="qr-section">
                    <h3>📱 Ваш QR код</h3>
                    <div class="qr-container" id="qrcode"></div>
                </div>

                <div class="scan-section">
                    <h3>🔍 Подключиться к другу</h3>
                    <input type="text" id="scanInput" class="scan-input" placeholder="Введите ID друга">
                    <button class="btn btn-primary" onclick="sendConnection()">📡 Отправить запрос</button>
                </div>

                <div class="chats-list">
                    <h3>💬 Чаты</h3>
                    <div id="chatsList"></div>
                </div>
            </div>
            
            <div class="chat-panel">
                <div class="chat-header">
                    <h3 id="chatTitle">Выберите чат</h3>
                    <div class="connection-status" id="connectionStatus">⚡ Не подключен</div>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <textarea id="messageInput" placeholder="Сообщение..." rows="2"></textarea>
                    <button id="sendBtn" onclick="sendMessage()" disabled>📨</button>
                </div>
            </div>
        </div>
    </div>

    <div id="requestModal" class="request-modal" style="display: none;"></div>

    <script>
        // Конфигурация WebRTC
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        // Генерация ID
        let myId = localStorage.getItem('myId');
        if (!myId) {
            myId = Math.random().toString(36).substr(2, 10).toUpperCase();
            localStorage.setItem('myId', myId);
        }

        // Переменные
        let peerConnection = null;
        let dataChannel = null;
        let currentPeer = null;
        let activeConnections = new Map();
        let pendingOffer = null;

        // Чаты
        let chats = JSON.parse(localStorage.getItem('chats') || '{}');

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        function addMessage(peerId, text, isSent) {
            if (!chats[peerId]) {
                chats[peerId] = { name: peerId, messages: [] };
            }
            chats[peerId].messages.push({ text, isSent, time: new Date() });
            saveChats();
            if (currentPeer === peerId) renderMessages();
            renderChats();
        }

        function renderMessages() {
            let container = document.getElementById('messages');
            if (!currentPeer || !chats[currentPeer]) {
                container.innerHTML = '<div style="text-align:center;color:#999;padding:20px">Выберите чат</div>';
                return;
            }
            let msgs = chats[currentPeer].messages;
            container.innerHTML = msgs.map(m => `
                <div class="message ${m.isSent ? 'sent' : 'received'}">
                    <div>${escapeHtml(m.text)}</div>
                    <div style="font-size:10px;opacity:0.7;margin-top:4px">${new Date(m.time).toLocaleTimeString()}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function renderChats() {
            let container = document.getElementById('chatsList');
            let sorted = Object.keys(chats).sort((a,b) => {
                let aLast = chats[a].messages[chats[a].messages.length-1]?.time || 0;
                let bLast = chats[b].messages[chats[b].messages.length-1]?.time || 0;
                return bLast - aLast;
            });
            container.innerHTML = sorted.map(id => `
                <div class="chat-item ${currentPeer === id ? 'active' : ''}" onclick="selectChat('${id}')">
                    <span>${id.substr(0,12)}...</span>
                    <span>${chats[id].messages.length}</span>
                </div>
            `).join('');
            if (!sorted.length) container.innerHTML = '<div style="text-align:center;color:#999;padding:20px">Нет чатов</div>';
        }

        function selectChat(peerId) {
            currentPeer = peerId;
            document.getElementById('chatTitle').innerHTML = `Чат: ${peerId.substr(0,12)}...`;
            renderMessages();
            renderChats();
            
            let conn = activeConnections.get(peerId);
            if (conn && conn.readyState === 'open') {
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('connectionStatus').innerHTML = '✅ Подключено';
            } else {
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('connectionStatus').innerHTML = '❌ Не подключен';
            }
        }

        function copyUserId() {
            navigator.clipboard.writeText(myId);
            alert('✅ ID скопирован');
        }

        // Генерация QR
        function generateQR() {
            let qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: myId,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        // Отправить запрос на подключение
        async function sendConnection() {
            let targetId = document.getElementById('scanInput').value.trim();
            if (!targetId) {
                alert('Введите ID друга');
                return;
            }
            
            if (targetId === myId) {
                alert('Нельзя подключиться к себе');
                return;
            }
            
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            dataChannel = peerConnection.createDataChannel('chat');
            
            dataChannel.onopen = () => {
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('connectionStatus').innerHTML = '✅ Подключено';
                activeConnections.set(targetId, dataChannel);
                if (currentPeer === targetId) selectChat(targetId);
                alert('✅ Соединение установлено!');
            };
            dataChannel.onclose = () => {
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('connectionStatus').innerHTML = '❌ Разорвано';
                activeConnections.delete(targetId);
            };
            dataChannel.onmessage = (e) => {
                addMessage(targetId, e.data, false);
                if (currentPeer === targetId) renderMessages();
            };
            
            // Собираем offer
            let offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // Ждем ICE кандидатов
            await new Promise(resolve => {
                peerConnection.onicecandidate = (e) => {
                    if (e.candidate === null) resolve();
                };
                setTimeout(resolve, 2000);
            });
            
            // Отправляем запрос другу
            let offerData = {
                from: myId,
                sdp: peerConnection.localDescription.sdp
            };
            let offerText = JSON.stringify(offerData);
            
            // Копируем в буфер и показываем уведомление
            navigator.clipboard.writeText(offerText);
            alert(`✅ Код запроса скопирован!\n\nОтправьте его другу любым способом (Telegram, WhatsApp)\n\nДруг должен вставить этот код в поле "Вставить запрос"`);
        }

        // Показать входящий запрос
        function showIncomingRequest(fromId, offerSdp) {
            pendingOffer = { fromId, offerSdp };
            
            let modal = document.getElementById('requestModal');
            modal.innerHTML = `
                <div style="text-align:center">
                    <div style="font-size:48px;margin-bottom:10px">🔔</div>
                    <div style="font-weight:600;font-size:16px;margin-bottom:5px">${fromId.substr(0,20)}...</div>
                    <div style="font-size:13px;color:#666;margin-bottom:15px">хочет подключиться</div>
                    <div class="request-buttons">
                        <button class="btn-success" onclick="acceptRequest()" style="background:#10b981;color:white">✅ Принять</button>
                        <button class="btn-danger" onclick="rejectRequest()" style="background:#ef4444;color:white">❌ Отклонить</button>
                    </div>
                </div>
            `;
            modal.style.display = 'block';
            
            // Автоматически скрыть через 30 секунд
            setTimeout(() => {
                if (modal.style.display === 'block') modal.style.display = 'none';
            }, 30000);
        }

        function rejectRequest() {
            document.getElementById('requestModal').style.display = 'none';
            pendingOffer = null;
        }

        window.acceptRequest = async function() {
            if (!pendingOffer) return;
            
            let { fromId, offerSdp } = pendingOffer;
            document.getElementById('requestModal').style.display = 'none';
            
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.ondatachannel = (e) => {
                dataChannel = e.channel;
                dataChannel.onopen = () => {
                    document.getElementById('sendBtn').disabled = false;
                    document.getElementById('connectionStatus').innerHTML = '✅ Подключено';
                    activeConnections.set(fromId, dataChannel);
                    if (currentPeer === fromId) selectChat(fromId);
                    alert('✅ Соединение установлено!');
                };
                dataChannel.onclose = () => {
                    document.getElementById('sendBtn').disabled = true;
                    document.getElementById('connectionStatus').innerHTML = '❌ Разорвано';
                    activeConnections.delete(fromId);
                };
                dataChannel.onmessage = (e) => {
                    addMessage(fromId, e.data, false);
                    if (currentPeer === fromId) renderMessages();
                };
            };
            
            let offer = new RTCSessionDescription({ type: 'offer', sdp: offerSdp });
            await peerConnection.setRemoteDescription(offer);
            let answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            await new Promise(resolve => {
                peerConnection.onicecandidate = (e) => {
                    if (e.candidate === null) resolve();
                };
                setTimeout(resolve, 2000);
            });
            
            let answerData = {
                type: 'answer',
                sdp: peerConnection.localDescription.sdp
            };
            let answerText = JSON.stringify(answerData);
            
            navigator.clipboard.writeText(answerText);
            alert(`✅ Код ответа скопирован!\n\nОтправьте его другу\n\nДруг должен вставить этот код в поле "Вставить ответ"`);
            pendingOffer = null;
        };

        // Обработка ответа от друга
        window.handleAnswer = async function(answerText) {
            try {
                let data = JSON.parse(answerText);
                if (data.type === 'answer' && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                    alert('✅ Соединение подтверждено!');
                }
            } catch(e) {
                alert('Ошибка при обработке ответа');
            }
        };

        // Вставить запрос от друга (единственный способ получить запрос)
        window.pasteOffer = function() {
            let text = prompt('📨 Вставьте код запроса от друга:');
            if (!text) return;
            try {
                let data = JSON.parse(text);
                if (data.from && data.sdp) {
                    showIncomingRequest(data.from, data.sdp);
                } else {
                    alert('Неверный формат');
                }
            } catch(e) {
                alert('Неверный формат');
            }
        };

        // Вставить ответ от друга
        window.pasteAnswer = function() {
            let text = prompt('📨 Вставьте код ответа от друга:');
            if (!text) return;
            handleAnswer(text);
        };

        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text || !currentPeer) return;
            
            let conn = activeConnections.get(currentPeer);
            if (!conn || conn.readyState !== 'open') {
                alert('Соединение не установлено');
                return;
            }
            
            conn.send(text);
            addMessage(currentPeer, text, true);
            input.value = '';
            renderMessages();
        }

        function escapeHtml(s) {
            return s.replace(/[&<>]/g, function(c) {
                if(c === '&') return '&amp;';
                if(c === '<') return '&lt;';
                if(c === '>') return '&gt;';
                return c;
            });
        }

        // Добавляем кнопки для вставки запроса и ответа (только они нужны для обмена)
        function addButtons() {
            let container = document.querySelector('.scan-section');
            let btnDiv = document.createElement('div');
            btnDiv.style.marginTop = '10px';
            btnDiv.style.display = 'flex';
            btnDiv.style.gap = '8px';
            btnDiv.innerHTML = `
                <button class="btn btn-primary" onclick="pasteOffer()" style="flex:1; margin:0">📨 Вставить запрос</button>
                <button class="btn btn-primary" onclick="pasteAnswer()" style="flex:1; margin:0">📨 Вставить ответ</button>
            `;
            container.appendChild(btnDiv);
        }

        // Инициализация
        document.getElementById('userId').innerHTML = myId;
        document.getElementById('avatar').innerHTML = myId[0];
        generateQR();
        renderChats();
        addButtons();
        
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        
        alert(`🔑 Ваш ID: ${myId}\n\n📱 Друг сканирует QR или вводит ваш ID\n📨 Вы вставляете его запрос\n✅ Принимаете\n🔗 Общаетесь`);
    </script>
</body>
</html>
